name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"

categories:
  - title: "Features"
    labels:
      - "feat"
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "fix"
      - "bug"
      - "bugfix"
  - title: "Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "Maintenance"
    labels:
      - "chore"
      - "ci"
      - "build"
      - "refactor"
      - "test"
  - title: "Dependencies"
    labels:
      - "dependencies"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"

template: |
  ## Changes
  $CHANGES

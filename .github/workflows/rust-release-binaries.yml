name: rust-release-binaries

on:
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_ref:
        description: Release commit SHA or tag to build
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Rust release binary (${{ matrix.package_name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            package_dir: maximus-linux-x64-gnu
            package_name: "@jeremyfellaz/maximus-linux-x64-gnu"
          - runner: ubuntu-24.04-arm
            package_dir: maximus-linux-arm64-gnu
            package_name: "@jeremyfellaz/maximus-linux-arm64-gnu"
          - runner: macos-15-intel
            package_dir: maximus-darwin-x64
            package_name: "@jeremyfellaz/maximus-darwin-x64"
          - runner: macos-14
            package_dir: maximus-darwin-arm64
            package_name: "@jeremyfellaz/maximus-darwin-arm64"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build release binary
        run: cargo build --release -p maximus-cli

      - name: Stage artifact
        shell: bash
        run: |
          artifact_root="$RUNNER_TEMP/${{ matrix.package_dir }}"
          mkdir -p "$artifact_root"
          cp ./target/release/maximus "$artifact_root/maximus"
          chmod +x "$artifact_root/maximus"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_dir }}
          path: ${{ runner.temp }}/${{ matrix.package_dir }}/maximus
          if-no-files-found: error

name: action-smoke

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      release_sha:
        required: false
        type: string
        default: ""
      command:
        required: false
        type: string
        default: audit
      path:
        required: false
        type: string
        default: test/fixtures/clean-project
      registry_url:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published release tag to smoke
        required: true
        type: string
      release_sha:
        description: Optional release commit SHA to lock the smoke target
        required: false
        default: ""
        type: string
      command:
        description: Maximus command to run
        required: false
        default: audit
        type: string
      path:
        description: Project path to inspect
        required: false
        default: test/fixtures/clean-project
        type: string
      registry_url:
        description: Optional npm registry override
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Action smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_sha || inputs.release_tag }}

      - name: Assert checked out release target
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ -n "$RELEASE_SHA" ]]; then
            test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
            git fetch --depth=1 origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_SHA"
          else
            checked_ref="$(git describe --tags --exact-match HEAD)"
            test "$checked_ref" = "$RELEASE_TAG"
          fi

      # GitHub Actions does not allow dynamic expressions in step-level `uses:`.
      # To smoke the same consumer contract, we checkout the requested release tag
      # and run the local action from that exact tagged snapshot.
      - name: Run Maximus action from checked-out release tag
        uses: ./
        with:
          command: ${{ inputs.command }}
          path: ${{ inputs.path }}
          registry-url: ${{ inputs.registry_url }}

      - name: Run marketplace wrapper action from checked-out release tag
        uses: ./.github/actions/marketplace-wrapper
        with:
          command: ${{ inputs.command }}
          path: ${{ inputs.path }}
          registry-url: ${{ inputs.registry_url }}
